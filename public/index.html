<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booth Avatar Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Booth Avatar Finder</h1>
    <p class="subtitle">アバターを選んで、対応アイテムをBoothで探そう</p>
  </header>

  <main>
    <!-- Left: Avatar list -->
    <aside class="avatar-panel">
      <div class="panel-header">
        <h2>アバター一覧</h2>
        <input type="text" id="avatar-search" placeholder="アバター名で絞り込み..." autocomplete="off">
      </div>
      <div id="avatar-list">
        <div class="loading">読み込み中...</div>
      </div>
      <div id="avatar-pagination"></div>
    </aside>

    <!-- Right: Items -->
    <section class="items-panel">
      <div class="items-header">
        <div id="selected-info">
          <span class="placeholder-text">← アバターを選択してください</span>
        </div>
        <div class="search-row">
          <div class="tag-area" id="tag-area"></div>
          <input type="text" id="keyword-input" placeholder="キーワード（例：ワンピース）" autocomplete="off">
          <button id="search-btn">検索</button>
        </div>
        <div class="filter-row">
          <span class="filter-label">価格</span>
          <input type="range" id="price-max" min="0" max="5000" step="250" value="5000">
          <span id="price-max-label" class="price-val">上限なし</span>
          <button id="filter-clear">クリア</button>
        </div>
        <div id="search-status"></div>
      </div>

      <div id="items-grid"></div>

      <div id="pagination"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
